name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level moderate

      - name: Lint frontend
        run: pnpm lint:fe

      - name: Build frontend
        env:
          BACKEND_API_URL: http://localhost:5000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: dep-test-1-ci-auth-secret-change-me
        run: pnpm build:fe

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore be/be.csproj

      - name: Audit backend dependencies
        run: dotnet list be/be.csproj package --vulnerable --include-transitive

      - name: Build backend
        run: dotnet build be/be.csproj --configuration Release --no-restore

      - name: Build frontend Docker image
        run: docker build -f fe/Dockerfile .

      - name: Build backend Docker image
        run: docker build -f be/Dockerfile be
